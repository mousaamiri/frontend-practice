<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modanl enter and exit effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="btn-open" id="openModalBtn">باز کردن مدال</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <h3 class="modal-title">عنوان مدال شما</h3>
            <p class="modal-text">این یک متن نمونه برای داخل مدال است. شما می‌توانید هر محتوایی را که می‌خواهید در این بخش قرار دهید.</p>
            <button class="btn-close" id="closeModalBtn">بستن</button>
        </div>
    </div>

 <script src="script.js"></script>
</body>
</html>
