<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>
    <link rel="stylesheet" href="base-style.css">
    <link rel="stylesheet" href="custome-style.css">
</head>
<body data-theme="dark">
    <button class="switch-theme">
        <img src="assets/images/sun.svg" alt="Switch Theme" class="switch-theme">
    </button>
    <main>
      <!-- Pricing Table -->
       <section class="pricing-table">
            <div class="pricing-card">
                <h2 class="pricing-card__title">پایه</h2>
                <p class="pricing-card__price">150 هزار تومان</p>
                <ul class="pricing-card__features">
                    <li>ویژگی  1</li>
                    <li>ویژگی 2</li>
                    <li>ویژگی 3</li>
                </ul>
                <button class="pricing-card__button">انتخاب این طرح</button>
            </div>
            <div class="pricing-card pricing-card__marked">
                <h2 class="pricing-card__title">استاندارد</h2>
                <p class="pricing-card__price">290 هزار تومان</p>
                <ul class="pricing-card__features">
                    <li>ویژگی 1</li>
                    <li>ویژگی 2</li>
                    <li>ویژگی 3</li>
                    <li>ویژگی 4</li>
                </ul>
                <button class="pricing-card__button">انتخاب این طرح</button>
            </div>
            <div class="pricing-card">
                <h2 class="pricing-card__title">پریمیوم</h2>
                <p class="pricing-card__price">2 میلیون تومان</p>
                <ul class="pricing-card__features">
                    <li>ویژگی 1</li>
                    <li>ویژگی 2</li>
                    <li>ویژگی 3</li>
                    <li>ویژگی 4</li>
                    <li>ویژگی 5</li>
                </ul>
                <button class="pricing-card__button">انتخاب این طرح</button>
            </div>
        </section>  
    </main>
    <script src="script.js"></script>
</body>
</html>
