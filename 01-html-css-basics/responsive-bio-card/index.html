<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Bio card </title>
    <link rel="stylesheet" href="base-style.css">
    <link rel="stylesheet" href="custome-style.css">
</head>
<body data-theme="dark">
    <img src="assets/images/sun.svg" alt="Switch Theme" class="switch-theme">
    <main>
        <div class="card">
            <!--card image-->
            <div class="card-image">
                <img src="assets/images/mousa-amiri.png" alt="avatar">
            </div>
            <div class="card-content">
                <!-- card title -->
             <div class="card-title">
                <h2>موسی امیری مطلق</h2>
             </div>
             <!-- card  description -->
              <div class="card-description">
                <p> تخصص‌های فنی: تمرکز اصلی او بر روی توسعه سمت سرور (Backend) با استفاده از اکوسیستم .NET و زبان برنامه‌نویسی C# است. او در زمینه طراحی ساختار بانک‌های اطلاعاتی، توسعه APIها و پیاده‌سازی منطق سیستم‌ها فعالیت می‌کند.</p>
              </div>
              <div class="footer">
                <div class="folowers">
                    <img class="followers-icon" src="assets/images/avatar-dark.svg" alt="members">
                    <p>12M</p>
                </div>
                <button class="btn-primary"><span>+</span> Follow </button>
            </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
